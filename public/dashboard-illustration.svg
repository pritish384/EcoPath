<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFCF2"/>
      <stop offset="1" stop-color="#F4F9EC"/>
    </linearGradient>
    <linearGradient id="panel" x1="120" y1="90" x2="1080" y2="710" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBFFF6"/>
    </linearGradient>
    <linearGradient id="nodeA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0FAE92"/>
      <stop offset="1" stop-color="#22C7A8"/>
    </linearGradient>
    <linearGradient id="nodeB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1FBA9E"/>
      <stop offset="1" stop-color="#56D9BE"/>
    </linearGradient>
    <linearGradient id="nodeC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2BC7AE"/>
      <stop offset="1" stop-color="#72E3CD"/>
    </linearGradient>
    <linearGradient id="nodeD" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10B18F"/>
      <stop offset="1" stop-color="#40C9A7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B5A4B" flood-opacity="0.16"/>
    </filter>
    <filter id="chipShadow" x="-30%" y="-80%" width="160%" height="260%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0E4F41" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#1B8D78"/>
    </marker>
    <style>
      .label{font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight:700; letter-spacing:0.14em; fill:#0C2F29;}
      .small{font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; font-weight:600; letter-spacing:0.03em; fill:#1E5D52;}
    </style>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <rect x="54" y="44" width="1092" height="712" rx="66" fill="url(#panel)" stroke="#D9E7D8"/>

  <!-- pathway arcs -->
  <g fill="none" stroke="#1B8D78" stroke-width="14" stroke-linecap="round" opacity="0.9">
    <path d="M332 248C432 176 552 176 652 248" marker-end="url(#arrow)"/>
    <path d="M744 248C844 176 954 184 1024 252" marker-end="url(#arrow)"/>
    <path d="M680 292C692 372 672 452 600 520" marker-end="url(#arrow)"/>
    <path d="M1010 292C988 410 874 498 740 530" marker-end="url(#arrow)"/>
    <path d="M314 292C336 410 450 498 584 530" marker-end="url(#arrow)"/>
  </g>

  <!-- nodes -->
  <g filter="url(#softShadow)">
    <circle cx="260" cy="260" r="92" fill="url(#nodeA)"/>
    <circle cx="260" cy="260" r="17" fill="#EFFFFB"/>

    <circle cx="700" cy="260" r="98" fill="url(#nodeB)"/>
    <circle cx="700" cy="260" r="18" fill="#F2FFFC"/>

    <circle cx="1020" cy="260" r="86" fill="url(#nodeC)"/>
    <circle cx="1020" cy="260" r="16" fill="#F2FFFC"/>

    <circle cx="640" cy="560" r="108" fill="url(#nodeD)"/>
    <circle cx="640" cy="560" r="20" fill="#EFFFFB"/>
  </g>

  <!-- chips -->
  <g filter="url(#chipShadow)">
    <rect x="110" y="108" rx="20" ry="20" width="250" height="54" fill="#FFFCEB" stroke="#DCE8D5"/>
    <rect x="570" y="108" rx="20" ry="20" width="258" height="54" fill="#FFFCEB" stroke="#DCE8D5"/>
    <rect x="904" y="108" rx="20" ry="20" width="238" height="54" fill="#FFFCEB" stroke="#DCE8D5"/>
    <rect x="402" y="680" rx="22" ry="22" width="476" height="60" fill="#FFFCEB" stroke="#DCE8D5"/>
  </g>

  <!-- labels -->
  <text x="235" y="143" text-anchor="middle" font-size="28" class="label">COLLECTION</text>
  <text x="699" y="143" text-anchor="middle" font-size="28" class="label">SORTING</text>
  <text x="1023" y="143" text-anchor="middle" font-size="26" class="label">RECOVERY</text>
  <text x="640" y="719" text-anchor="middle" font-size="34" class="label">CIRCULAR OUTCOMES</text>

  <text x="260" y="374" text-anchor="middle" font-size="22" class="small">Input stream</text>
  <text x="700" y="382" text-anchor="middle" font-size="22" class="small">Material split</text>
  <text x="1020" y="364" text-anchor="middle" font-size="22" class="small">Value recovery</text>
  <text x="640" y="695" text-anchor="middle" font-size="20" class="small">Recycle • Reuse • Compost • Return</text>
</svg>
